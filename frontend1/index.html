<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Management Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

<header>
  <h1>School Management System</h1>
</header>

<nav>
  <a onclick="showForm('studentForm')">Student Admission</a>
  <a onclick="showForm('teacherForm')">Teacher Registration</a>
  <a onclick="showForm('classScheduleForm')">Class Schedule</a>
  <a onclick="showForm('examResultForm')">Exam Result Entry</a>
</nav>

<div class="container">

  <form id="studentForm">
    <h2>Student Admission Form</h2>
    <input type="text" name="student_name" placeholder="Student Name" required />
    <input type="date" name="dob" required />
    <input type="text" name="grade" placeholder="Grade" required />
    <input type="text" name="parent_info" placeholder="Parent/Guardian Info" required />
    <input type="text" name="previous_school" placeholder="Previous School" />
    <button type="submit">Submit Student</button>
  </form>

  <form id="teacherForm">
    <h2>Teacher Registration Form</h2>
    <input type="text" name="name" placeholder="Teacher Name" required />
    <input type="text" name="subject_special" placeholder="Subject Special" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="number" name="phone" placeholder="Phone" required />
    <input type="text" name="qualification" placeholder="Qualification" required />
    <button type="submit">Submit Teacher</button>
  </form>

  <form id="classScheduleForm">
    <h2>Class Schedule Form</h2>
    <input type="text" name="class_name" placeholder="Class" required />
    <input type="text" name="subject" placeholder="Subject" required />
    <input type="number" name="teacher_id" placeholder="Teacher ID" required />
    <input type="text" name="days" placeholder="Days (e.g. Mon, Wed)" required />
    <input type="text" name="time_slot" placeholder="Time Slot (e.g. 10:00-11:00)" required />
    <button type="submit">Submit Schedule</button>
  </form>

  <form id="examResultForm">
    <h2>Exam Result Entry</h2>
    <input type="number" name="student_id" placeholder="Student ID" required />
    <input type="text" name="subject" placeholder="Subject" required />
    <input type="date" name="exam_date" required />
    <input type="number" name="marks_obtained" placeholder="Marks Obtained" required />
    <button type="submit">Submit Exam Result</button>
  </form>

</div>

<script>
function showForm(id) {
  document.querySelectorAll('form').forEach(form => form.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function sendFormData(formId, url) {
  document.getElementById(formId).addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const jsonData = {};
    formData.forEach((value, key) => jsonData[key] = value);

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(jsonData)
    })
    .then(res => res.json())
    .then(data => alert(data.message || "Success!"))
    .catch(err => alert("Error: " + err.message));
  });
}

sendFormData('studentForm', 'http://localhost:5000/api/students');
sendFormData('teacherForm', 'http://localhost:5000/api/teachers');
sendFormData('classScheduleForm', 'http://localhost:5000/api/class_schedule');
sendFormData('examResultForm', 'http://localhost:5000/api/exam_results');

showForm('studentForm');
</script>

</body>
</html>
